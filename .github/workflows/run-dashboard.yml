name: 🚀 Run Dashboard V4 (Live URL)

on:
  workflow_dispatch:

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Pull Docker image
        run: docker pull kiran9538/kcc-automation:latest

      - name: Run container
        run: |
          docker run -d --name kcc-app \
            -p 5000:5000 \
            -p 6080:6080 \
            kiran9538/kcc-automation:latest

      - name: Wait for app to start
        run: sleep 30

      - name: Install Cloudflare Tunnel
        run: |
          curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: 🌐 Print Dashboard URL
        run: |
          cloudflared tunnel --url http://localhost:5000 \
            --no-autoupdate > /tmp/cf.log 2>&1 &
          sleep 20
          echo "========================================"
          echo "✅ DASHBOARD V4 IS LIVE!"
          echo "========================================"
          grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' /tmp/cf.log \
            || cat /tmp/cf.log
          sleep 1500
