name: 🚀 Run Dashboard V4 (Live URL)

on:
  workflow_dispatch:

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Pull Docker image
        run: docker pull kiran9538/kcc-automation:latest

      - name: Run Dashboard V4 container
        run: |
          docker run -d --name kcc-app \
            -p 8501:8501 \
            kiran9538/kcc-automation:latest

      - name: Wait for app to start
        run: sleep 25

      - name: 🔍 Debug - Container status and logs
        run: |
          echo "=== CONTAINER STATUS ==="
          docker ps -a
          echo ""
          echo "=== CONTAINER LOGS ==="
          docker logs kcc-app
          echo ""
          echo "=== OPEN PORTS ON HOST ==="
          ss -tlnp
          echo ""
          echo "=== DOCKER INSPECT PORTS ==="
          docker inspect kcc-app --format='{{json .NetworkSettings.Ports}}'
          echo ""
          echo "=== PROCESSES INSIDE CONTAINER ==="
          docker exec kcc-app ps aux || true
          echo ""
          echo "=== TEST PORT 8501 ==="
          curl -s http://localhost:8501 || echo "Port 8501 not responding"

      - name: Install Cloudflare Tunnel
        run: |
          curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: 🌐 Print Dashboard URL
        run: |
          PORT=$(ss -tlnp | grep -oP '(?<=:)\d{4,5}' | grep -v '2222' | head -1)
          echo "Using port: ${PORT:-8501}"
          cloudflared tunnel --url http://localhost:${PORT:-8501} \
            --no-autoupdate > /tmp/cf.log 2>&1 &
          sleep 20
          echo "========================================"
          echo "  ✅ DASHBOARD V4 IS LIVE!"
          echo "  🔗 URL BELOW:"
          echo "========================================"
          grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' /tmp/cf.log || \
          cat /tmp/cf.log
          sleep 1500
