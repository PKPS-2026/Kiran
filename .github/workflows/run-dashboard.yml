name: 🚀 Run Dashboard V4 (Live URL)

on:
  workflow_dispatch:

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Pull Docker image
        run: docker pull kiran9538/kcc-automation:latest

      - name: Run Dashboard V4 container
        run: |
          docker run -d --name kcc-app \
            -p 8501:8501 \
            -p 5000:5000 \
            -p 8080:8080 \
            -p 8888:8888 \
            kiran9538/kcc-automation:latest

      - name: Wait for app to start
        run: sleep 25

      - name: Check what port app is listening on
        run: |
          echo "=== Container logs ==="
          docker logs kcc-app
          echo "=== Listening ports ==="
          docker exec kcc-app ss -tlnp || \
          docker exec kcc-app netstat -tlnp || \
          ss -tlnp

      - name: Install Cloudflare Tunnel
        run: |
          curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: 🌐 Print Dashboard URL
        run: |
          # Detect port
          PORT=$(ss -tlnp | grep -oP '(?<=:)\d+' | grep -v '22\|53' | head -1)
          echo "Detected port: $PORT"
          cloudflared tunnel --url http://localhost:${PORT:-8501} \
            --no-autoupdate > /tmp/cf.log 2>&1 &
          sleep 20
          echo "========================================"
          echo "  ✅ DASHBOARD V4 IS LIVE!"
          echo "  🔗 URL BELOW:"
          echo "========================================"
          grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' /tmp/cf.log || \
          cat /tmp/cf.log
          sleep 1500
