version: '3.8'

services:
  kcc-dashboard:
    build: .
    container_name: kcc-automation
    ports:
      - "5000:5000"   # Dashboard UI
      - "6080:6080"   # noVNC — view Chrome browser
    shm_size: '2gb'   # Required for Chrome
    restart: unless-stopped
    environment:
      - DISPLAY=:99
    volumes:
      - ./uploads:/app/uploads   # Persist uploaded Excel files
